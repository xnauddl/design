name: CI

on:
  push:
    branches: [main]
  pull_request:

# 같은 ref에서 새 푸시가 오면 진행 중인 실행을 취소(중복 빌드 방지).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # `npm test`는 build 후 node --test 실행(package.json test 스크립트).
      - name: Build & Test
        run: npm test
