# ROADMAP.md → Notion 자동 동기화
#
# 최초 1회 설정:
#  1) https://www.notion.so/my-integrations 에서 내부 통합(Internal integration) 생성 → 토큰 복사
#  2) Notion 로드맵 페이지 우상단 ··· → Connections → 위 통합 연결(페이지 공유)
#  3) GitHub 저장소 → Settings → Secrets and variables → Actions 에 추가:
#       NOTION_TOKEN   = (1)의 통합 토큰
#       NOTION_PAGE_ID = 387606224513817cb6dff82f8a0b0bd2  (로드맵 페이지 ID)
# 이후 main 에 ROADMAP.md 가 푸시되면 자동 실행됩니다. (수동 실행: Actions 탭 → Run workflow)
name: Sync roadmap to Notion

on:
  push:
    branches: [main]
    paths:
      - 'ROADMAP.md'
      - 'scripts/sync-roadmap-notion.mjs'
      - '.github/workflows/notion-roadmap-sync.yml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Sync ROADMAP.md to Notion
        run: node scripts/sync-roadmap-notion.mjs
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
